# Docker Compose for HunterTeck Development
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile
    container_name: hunterteck-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/data/leads.db
      - LOG_LEVEL=INFO
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      - ./services:/app/services
    networks:
      - hunterteck-network
    healthcheck:
      test: ["CMD", "python", "-c", "import logging; logging.info('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.streamlit
    container_name: hunterteck-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - DATABASE_PATH=/data/leads.db
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      - ./app_hunter.py:/app/app_hunter.py
    networks:
      - hunterteck-network
    depends_on:
      - backend

volumes:
  data:
  logs:

networks:
  hunterteck-network:
    driver: bridge
